<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teams — Hockey Stats</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a class="nav-logo" href="landing.html">🏒 Hockey Stats</a>
  <a href="players.html">Players</a>
  <a href="teams.html" class="active">Teams</a>
  <a href="lines.html">Lines</a>
  <a href="shots.html">Shots</a>
</nav>

<div class="page">
  <div class="page-title">Team Stats</div>
  <div class="page-sub">Select a team and season to see standings and full game log</div>

  <div class="filters">
    <div class="field">
      <label>Team</label>
      <select id="f-team" style="width:200px">
        <option value="">Select a team…</option>
      </select>
    </div>
    <div class="field">
      <label>Season</label>
      <select id="f-season" style="width:130px">
        <option value="">All seasons</option>
      </select>
    </div>
    <div class="field" style="justify-content:flex-end">
      <label>&nbsp;</label>
      <button onclick="search()">Load</button>
    </div>
  </div>

  <div id="season-section" style="display:none">
    <div class="page-title" style="font-size:16px;margin-bottom:12px" id="season-title"></div>
    <div id="season-result"></div>
  </div>

  <div id="gbg-section" style="display:none;margin-top:28px">
    <div class="page-title" style="font-size:16px;margin-bottom:12px">Game Log</div>
    <div id="gbg-result"></div>
  </div>

  <div id="empty-state">
    <div class="state-box"><div class="icon">🏟</div>Select a team and press Load</div>
  </div>
</div>

<script>
  async function loadDropdowns() {
    const [seasRes, teamRes] = await Promise.all([fetch("/api/seasons"), fetch("/api/teams-list")]);
    const seasons = await seasRes.json();
    const teams   = await teamRes.json();

    const sSel = document.getElementById("f-season");
    seasons.forEach(s => {
      const o = document.createElement("option");
      o.value = s.season_year; o.textContent = s.season_label || s.season_year;
      sSel.appendChild(o);
    });

    const tSel = document.getElementById("f-team");
    teams.forEach(t => {
      const o = document.createElement("option");
      o.value = t.team_code; o.textContent = `${t.team_code} — ${t.team_name}`;
      tSel.appendChild(o);
    });
  }

  async function search() {
    const team   = document.getElementById("f-team").value;
    const season = document.getElementById("f-season").value;
    if (!team) return;

    document.getElementById("empty-state").style.display   = "none";
    document.getElementById("season-section").style.display = "block";
    document.getElementById("gbg-section").style.display    = "block";
    document.getElementById("season-result").innerHTML = '<div class="spinner"></div>';
    document.getElementById("gbg-result").innerHTML    = '<div class="spinner"></div>';

    const params = new URLSearchParams({ team });
    if (season) params.set("season", season);

    const [seasRes, gbgRes] = await Promise.all([
      fetch("/api/teams?" + params),
      fetch("/api/team-games?" + params),
    ]);
    const seasData = await seasRes.json();
    const gbgData  = await gbgRes.json();

    const teamOpt = document.getElementById("f-team").options[document.getElementById("f-team").selectedIndex];
    const teamName = teamOpt ? teamOpt.text.split(" — ")[1] || team : team;
    document.getElementById("season-title").textContent = `${teamName} — Season Stats`;

    renderSeasonStats(seasData);
    renderGbg(gbgData);
  }

  const SEASON_COLS = [
    { key: "season_year", label: "Season",   fmt: v => `<span class="muted">${v}</span>` },
    { key: "gp",          label: "GP",       fmt: v => v ?? "—" },
    { key: "gf",          label: "GF",       fmt: v => `<span class="hi">${v ?? "—"}</span>` },
    { key: "ga",          label: "GA",       fmt: v => v ?? "—" },
    { key: "_diff",       label: "+/-",      fmt: (v,r) => { const d=(Number(r.gf)||0)-(Number(r.ga)||0); return `<span style="color:${d>0?"#3fb950":d<0?"#f85149":"#8b949e"}">${d>0?"+":""}${d}</span>`; } },
    { key: "xgf",         label: "xGF",      fmt: v => v ?? "—" },
    { key: "xga",         label: "xGA",      fmt: v => v ?? "—" },
    { key: "sog_for",     label: "SOG For",  fmt: v => v ?? "—" },
    { key: "sog_against", label: "SOG Agnst",fmt: v => v ?? "—" },
    { key: "hits_for",    label: "Hits",     fmt: v => `<span class="muted">${v ?? "—"}</span>` },
    { key: "takeaways",   label: "TK",       fmt: v => `<span class="muted">${v ?? "—"}</span>` },
    { key: "giveaways",   label: "GV",       fmt: v => `<span class="muted">${v ?? "—"}</span>` },
  ];

  function renderSeasonStats(rows) {
    const el = document.getElementById("season-result");
    if (!rows.length) { el.innerHTML = '<div class="state-box">No season data found.</div>'; return; }

    let html = `<div class="table-wrap"><table><thead><tr>`;
    SEASON_COLS.forEach(c => { html += `<th>${c.label}</th>`; });
    html += `</tr></thead><tbody>`;
    rows.forEach(r => {
      html += `<tr>` + SEASON_COLS.map(c => `<td>${c.fmt(r[c.key], r)}</td>`).join("") + `</tr>`;
    });
    html += `</tbody></table></div>`;
    el.innerHTML = html;
  }

  const GBG_COLS = [
    { key: "date",        label: "Date",    fmt: v => `<span class="muted">${v ? String(v).slice(0,10) : "—"}</span>` },
    { key: "season_year", label: "Season",  fmt: v => `<span class="muted">${v}</span>` },
    { key: "venue",       label: "H/A",     fmt: v => `<span class="muted">${v}</span>` },
    { key: "_matchup",    label: "Matchup", fmt: (v,r) => `${r.home_team_name} vs ${r.away_team_name}` },
    { key: "_score",      label: "Score",   fmt: (v,r) => `<strong>${r.home_score} – ${r.away_score}</strong>` },
    { key: "result",      label: "Result",  fmt: v => `<span style="color:${v==='W'?'#3fb950':'#f85149'};font-weight:600">${v}</span>` },
  ];

  function renderGbg(data) {
    const el = document.getElementById("gbg-result");
    if (!data.length) { el.innerHTML = '<div class="state-box">No games found.</div>'; return; }

    let html = `<div class="result-meta"><span class="result-count">${data.length} games</span></div>`;
    html += `<div class="table-wrap"><table><thead><tr>`;
    GBG_COLS.forEach(c => { html += `<th>${c.label}</th>`; });
    html += `</tr></thead><tbody>`;
    data.forEach(r => {
      html += `<tr>` + GBG_COLS.map(c => `<td>${c.fmt(r[c.key], r)}</td>`).join("") + `</tr>`;
    });
    html += `</tbody></table></div>`;
    el.innerHTML = html;
  }

  loadDropdowns();
</script>
</body>
</html>
