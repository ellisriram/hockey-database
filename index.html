<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hockey Stats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117; color: #e6edf3; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 60px 16px;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #8b949e; margin-bottom: 32px; }

  .search-row {
    display: flex; gap: 8px; width: 100%; max-width: 480px; margin-bottom: 40px;
  }
  input {
    flex: 1; padding: 10px 14px; background: #161b22; border: 1px solid #30363d;
    border-radius: 8px; color: #e6edf3; font-size: 15px; outline: none;
  }
  input:focus { border-color: #58a6ff; }
  button {
    padding: 10px 20px; background: #238636; border: none; border-radius: 8px;
    color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  button:hover { background: #2ea043; }

  .results { width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 24px; }

  .player-card {
    background: #161b22; border: 1px solid #30363d; border-radius: 10px; overflow: hidden;
  }
  .player-header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px; border-bottom: 1px solid #21262d;
  }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%; background: #1f6feb;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; color: #fff; flex-shrink: 0;
  }
  .player-name { font-size: 17px; font-weight: 600; }
  .player-meta { font-size: 13px; color: #8b949e; margin-top: 2px; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 99px;
    font-size: 11px; font-weight: 600; margin-left: 6px;
  }
  .badge-C { background: rgba(88,166,255,.15); color: #58a6ff; }
  .badge-L, .badge-R { background: rgba(63,185,80,.15); color: #3fb950; }
  .badge-D { background: rgba(188,140,255,.15); color: #bc8cff; }
  .badge-G { background: rgba(210,153,34,.15); color: #d29922; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    padding: 8px 16px; text-align: right; font-size: 11px; font-weight: 600;
    color: #8b949e; text-transform: uppercase; letter-spacing: .04em;
    background: #0d1117; border-bottom: 1px solid #21262d;
  }
  thead th:first-child { text-align: left; }
  tbody td {
    padding: 9px 16px; text-align: right; border-bottom: 1px solid #21262d;
    font-variant-numeric: tabular-nums; font-family: 'SF Mono', monospace; font-size: 12px;
  }
  tbody td:first-child { text-align: left; font-family: inherit; font-size: 13px; color: #8b949e; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #1c2128; }
  .hi { color: #58a6ff; font-weight: 600; }

  .empty { text-align: center; color: #8b949e; padding: 48px; }
  .spinner {
    width: 20px; height: 20px; border: 2px solid #30363d; border-top-color: #58a6ff;
    border-radius: 50%; animation: spin .7s linear infinite; margin: 48px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: #f85149; text-align: center; padding: 24px; font-size: 14px; }
</style>
</head>
<body>

<h1>Hockey Stats</h1>
<p class="sub">Search any player by name</p>

<div class="search-row">
  <input id="q" type="text" placeholder="e.g. Connor McDavid…" autofocus
         onkeydown="if(event.key==='Enter') search()">
  <button onclick="search()">Search</button>
</div>

<div class="results" id="results"></div>

<script>
async function search() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const el = document.getElementById('results');
  el.innerHTML = '<div class="spinner"></div>';

  try {
    const res = await fetch(`/player?name=${encodeURIComponent(q)}`);
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();
    render(data);
  } catch(e) {
    el.innerHTML = `<div class="err">Could not reach server — is it running?<br><small style="color:#8b949e">uvicorn server:app --port 8000</small></div>`;
  }
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

function render(players) {
  const el = document.getElementById('results');
  if (!players.length) {
    el.innerHTML = '<div class="empty">No players found.</div>';
    return;
  }

  el.innerHTML = players.map(p => {
    const pos = p.position || '?';
    const meta = [p.shootscatches ? `Shoots ${p.shootscatches}` : null, p.birthdate ? `Born ${p.birthdate}` : null]
      .filter(Boolean).join(' · ');

    const rows = p.seasons.length
      ? p.seasons.map(s => `
          <tr>
            <td>${s.season}</td>
            <td>${s.gp ?? '—'}</td>
            <td class="hi">${s.goals ?? '—'}</td>
            <td>${s.a1 ?? '—'}</td>
            <td>${s.a2 ?? '—'}</td>
            <td class="hi">${s.points ?? '—'}</td>
            <td>${s.x_goals ?? '—'}</td>
            <td>${s.hd_goals ?? '—'}</td>
            <td>${s.game_score ?? '—'}</td>
            <td>${s.toi_min ?? '—'}</td>
          </tr>`).join('')
      : `<tr><td colspan="10" style="text-align:center;color:#8b949e;padding:20px">No game stats found</td></tr>`;

    return `
      <div class="player-card">
        <div class="player-header">
          <div class="avatar">${initials(p.name)}</div>
          <div>
            <div class="player-name">
              ${p.name}
              <span class="badge badge-${pos}">${pos}</span>
            </div>
            <div class="player-meta">${p.team || 'Unknown team'}${meta ? ' · ' + meta : ''}</div>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Season</th><th>GP</th><th>G</th><th>A1</th><th>A2</th>
              <th>PTS</th><th>xG</th><th>HDG</th><th>GS</th><th>TOI</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }).join('');
}
</script>
</body>
</html>
